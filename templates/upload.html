<!-- templates/upload.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume | Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dashboard-page">

    {% include 'navbar.html' %}

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-lg" style="border-radius: 16px;">
                    <h3 class="text-center mb-4">📤 Upload Your Resume</h3>

                    <!-- Flash messages -->
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}" role="alert">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <!-- enctype="multipart/form-data" is REQUIRED for file uploads to work -->
                    <form method="POST" action="{{ url_for('upload') }}" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="resume" class="form-label">Choose a PDF or DOCX file</label>
                            <input type="file" class="form-control" id="resume" name="resume" accept=".pdf,.docx" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Upload & Analyze</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    {% include 'footer.html' %}

</body>
</html>
